name: Deploy v3.0

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: dsts-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --prefer-offline || true
      - run: npx eslint functions/ --fix --max-warnings 100
      - run: npx prettier --check "**/*.js" "**/*.html" "**/*.css" || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check all JS
        run: |
          find functions -type f -name '*.js' -print0 | xargs -0 -n1 node --check

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Pinned to the account that OWNS the live domain duongsaotoasang.com
          # (project subdomain duongsaotoasang-com-v2-dd2.pages.dev). Do NOT change.
          accountId: 62d57eaa548617aeecac766e5a1cb98e
          command: pages deploy . --project-name=duongsaotoasang-com-v2 --branch=main --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30
          BASE="https://duongsaotoasang.com"
          for route in "/" "/club/" "/verify/" "/legacy/" "/sponsor/" "/trust/" "/map/" "/register/" "/mentor-network" "/dream-nurture"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$BASE$route")
            if [ "$code" != "200" ] && [ "$code" != "308" ]; then
              echo "FAIL $route → $code"
              exit 1
            fi
            echo "PASS $route → $code"
          done
