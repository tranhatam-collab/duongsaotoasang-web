      const fallbackContents = {
        "hanh-trinh-nhin-lai-chinh-minh": {
          title_vi: "Hành trình nhìn lại chính mình trong một thế giới quá ồn",
          title_en: "Looking back at yourself in an overly noisy world",
          excerpt_vi: "Có những giai đoạn con người không thiếu thông tin, mà thiếu sự lắng lại đủ sâu để nhận ra mình đang đi về đâu.",
          excerpt_en: "There are times when people do not lack information, but lack enough stillness to see where they are heading.",
          content_vi: `
            <p>Có những thời điểm con người sống giữa quá nhiều tín hiệu, quá nhiều lời mời gọi và quá nhiều tiếng ồn đến từ bên ngoài. Họ tưởng rằng mình đang tiến lên rất nhanh, nhưng sâu hơn, họ chỉ đang bị kéo đi bởi những thứ chưa từng được chọn một cách tỉnh táo.</p>
            <p>Khi nhịp sống trở nên quá dày đặc, con người rất dễ nhầm cảm giác bận rộn với cảm giác sống có ý nghĩa. Họ làm nhiều việc, theo dõi nhiều thứ, xuất hiện ở nhiều nơi, nhưng lại hiếm khi dừng lại đủ lâu để hỏi mình đang đi về đâu.</p>
            <p>Nhìn lại chính mình không phải là quay lưng với cuộc sống. Đó là hành động cần thiết để không đánh mất trục sống trong một thế giới luôn tìm cách phân tán sự chú ý của ta.</p>
            <p>Mỗi hành trình trưởng thành thật sự đều bắt đầu từ khả năng dừng lại, nhìn sâu hơn, phân biệt điều gì là giá trị thật và điều gì chỉ là một loại tiếng ồn đẹp đẽ nhưng rỗng.</p>
          `,
          content_en: `
            <p>There are moments when people live among too many signals, too many invitations, and too much noise coming from the outside world. They think they are moving forward quickly, but more deeply, they are simply being pulled by things they never consciously chose.</p>
            <p>When life becomes too dense, people easily confuse busyness with meaning. They do many things, follow many things, appear in many places, yet rarely stop long enough to ask where they are actually heading.</p>
            <p>Looking back at yourself is not turning away from life. It is a necessary act if you do not want to lose your axis in a world constantly trying to fragment your attention.</p>
            <p>Every real journey of maturity begins with the ability to pause, look deeper, distinguish real value from beautiful but empty noise, and choose more consciously.</p>

        },
        "sang-tao-khong-bat-dau-tu-tham-vong": {
          title_vi: "Sáng tạo không bắt đầu từ tham vọng mà từ sự thấy rõ",
          title_en: "Creativity does not begin with ambition but with clarity",
          excerpt_vi: "Điều tạo nên giá trị bền vững không phải là làm cho thật nhiều, mà là tạo ra đúng thứ cần được sinh ra.",
          excerpt_en: "What creates lasting value is not doing more, but bringing forth what truly needs to exist.",
          content_vi: `
            <p>Nhiều người nghĩ sáng tạo là phải mới, phải khác, phải gây ấn tượng thật mạnh. Nhưng nếu gốc của hành động sáng tạo chỉ là khao khát được nhìn thấy, thì sản phẩm ấy rất nhanh sẽ trở thành một màn trình diễn mệt mỏi.</p>
            <p>Sáng tạo bền vững bắt đầu khi con người thấy rõ một nhu cầu thật, một khoảng trống thật, một vấn đề thật mà cuộc sống đang cần được lấp đầy.</p>
            <p>Khi sáng tạo đi ra từ sự thấy rõ, nó không còn chỉ là công cụ để chứng minh bản thân. Nó trở thành một hình thức phục vụ, một cách đưa điều có ích vào cuộc sống thật.</p>
            <p>Bởi vậy, trước khi hỏi làm sao để tạo ra thứ gây ấn tượng, hãy hỏi điều gì thật sự cần được sinh ra. Từ đó, sáng tạo mới có gốc và có đường đi lâu dài.</p>
          `,
          content_en: `
            <p>Many people think creativity must be new, different, and highly impressive. But if the root of creative action is merely the desire to be seen, what is created quickly becomes an exhausting performance.</p>
            <p>Sustainable creativity begins when a person clearly sees a real need, a real gap, a real problem that life is asking to be addressed.</p>
            <p>When creativity comes from clear seeing, it is no longer merely a tool for self-proof. It becomes a form of service, a way of bringing something genuinely useful into real life.</p>
            <p>So before asking how to create something impressive, ask what truly needs to be born. From there, creativity gains roots and a path that can endure.</p>
          `,
          tags: "sáng tạo,nhận thức",
          created_at: "2026-02-26T08:00:00.000Z",
          type: "post",
          cover_url: ""

        "cong-dong-khong-phai-dam-dong": {
          title_vi: "Cộng đồng không phải đám đông, mà là những người cùng giữ một hướng đi",
          title_en: "Community is not a crowd, but people holding the same direction",
          excerpt_vi: "Một cộng đồng đúng không được xây bằng tiếng ồn, mà bằng sự tin cậy, trách nhiệm và khả năng cùng đi xa.",
          excerpt_en: "A true community is not built by noise, but by trust, responsibility, and the capacity to travel far together.",
          content_vi: `
            <p>Nhiều nơi tự gọi mình là cộng đồng chỉ vì có nhiều người xuất hiện cùng lúc. Nhưng số đông không đủ để tạo nên cộng đồng. Đám đông có thể tạo năng lượng nhất thời, còn cộng đồng thật cần nền tảng bền lâu hơn nhiều.</p>
            <p>Cộng đồng chỉ bắt đầu khi có giá trị chung. Những người đi cùng nhau phải biết điều gì là quan trọng, điều gì không thể đánh đổi, điều gì đáng giữ ngay cả khi hoàn cảnh thay đổi.</p>
            <p>Tầng tiếp theo là trách nhiệm chung. Một cộng đồng không thể sống lâu nếu ai cũng chỉ muốn nhận mà không muốn giữ. Phải có sự đóng góp, sự hiện diện và sự nghiêm túc trong cách mỗi người đứng trong cấu trúc chung.</p>
            <p>Khi hiểu điều đó, ta sẽ thấy cộng đồng không phải là nơi tụ lại cho đông. Đó là nơi cùng giữ một giá trị sống đủ thật để đi lâu dài với nhau.</p>
          `,
          content_en: `
            <p>Many places call themselves a community simply because many people appear at once. But numbers alone do not create community. A crowd may generate temporary energy, while real community requires a far more durable foundation.</p>
            <p>Community begins only when shared values exist. Those walking together must know what matters, what cannot be traded away, and what remains worth holding even as circumstances change.</p>
            <p>The next layer is shared responsibility. A community cannot endure if everyone only wants to receive and no one wants to hold. Contribution, presence, and seriousness are all required in the way each person stands within the common structure.</p>
            <p>Once this is understood, we see that community is not a place to gather in large numbers. It is a place where people hold a value real enough to walk together for a long time.</p>
          `,
          tags: "cộng đồng",

        document.getElementById("metaRow").innerHTML = `
          <span class="meta-pill">${DSTS.escapeHTML(typeText)}</span>
          <span class="meta-pill">${DSTS.escapeHTML(T.metaPublished)}: ${DSTS.escapeHTML(DSTS.formatDate(item.created_at))}</span>
          ${tags.length ? `<span class="meta-pill">${DSTS.escapeHTML(T.metaTags)}: ${DSTS.escapeHTML(tags.join(", "))}</span>` : ""}
        `;

        if (item.cover_url) {
          const coverWrap = document.getElementById("coverWrap");
          const coverImage = document.getElementById("coverImage");
          coverImage.src = item.cover_url;
          coverImage.alt = title || "";
          coverWrap.style.display = "";
        }

        document.getElementById("content").innerHTML = content || `<div class="status-box">${DSTS.escapeHTML(T.failed)}</div>`;
      }

      document.title = T.titleFallback;
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute("content", T.descriptionFallback);

      document.getElementById("heroEyebrow").textContent = T.eyebrow;
      document.getElementById("pageTitle").textContent = T.loadingTitle;
      document.getElementById("pageExcerpt").textContent = T.loadingDesc;
      document.getElementById("loadingText").textContent = T.loadingBody;
      document.getElementById("backPosts").textContent = T.backPosts;
      document.getElementById("backPosts").href = DSTS.withLang("/posts");
      document.getElementById("backHome").textContent = T.backHome;
      document.getElementById("backHome").href = DSTS.withLang("/");
      document.getElementById("siteFooter").innerHTML = `
        <div class="footer">
          <div class="wrap">${DSTS.escapeHTML(T.footer)}</div>
        </div>
      `;

      if (!slug) {
        document.getElementById("content").innerHTML = `<div class="status-box">${DSTS.escapeHTML(T.failed)}</div>`;
        return;
      }

      try {
        const item = await DSTS.apiFetch(`/content?slug=${encodeURIComponent(slug)}&lang=${lang}`);
        renderItem(item);
      } catch (_err) {
        if (fallbackContents[slug]) {
          renderItem(fallbackContents[slug]);
        } else {
          document.getElementById("content").innerHTML = `<div class="status-box">${DSTS.escapeHTML(T.failed)}</div>`;
        }
      }

      if ("IntersectionObserver" in window) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("in");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });

        document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
      } else {
        document.querySelectorAll(".reveal").forEach(el => el.classList.add("in"));
      }
    })();
  </script>
</body>
</html>
