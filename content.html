<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nội dung | Đường Sao Tỏa Sáng</title>
  <meta name="description" content="Nội dung chi tiết từ hệ thống Đường Sao Tỏa Sáng."/>
  <link rel="canonical" href="https://duongsaotoasang.com/content"/>
  <meta property="og:title" content="Nội dung | Đường Sao Tỏa Sáng"/>
  <meta property="og:description" content="Nội dung chi tiết từ hệ thống Đường Sao Tỏa Sáng."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://duongsaotoasang.com/content"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="stylesheet" href="/app.css"/>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="row">
        <div class="brand">
          <b>Đường Sao Tỏa Sáng</b>
          <span class="small muted">Star Path Light Up</span>
        </div>
        <nav class="nav">
          <a data-nav href="/">Trang chủ</a>
          <a data-nav href="/content?slug=about">Giới thiệu</a>
          <a data-nav href="/content?slug=program">Chương trình</a>
          <a data-nav href="/content?slug=events">Sự kiện</a>
          <a data-nav href="/content?slug=scripts">Kịch bản</a>
          <a data-nav href="/content?slug=donate">Gây quỹ</a>
          <a data-nav href="/content?slug=transparency">Minh bạch</a>
          <a data-nav href="/content?slug=legal">Pháp lý</a>
          <a data-nav href="/content?slug=contact">Liên hệ</a>
          <a class="btn" href="/posts.html">Bài viết</a>
          <button class="langbtn" data-lang-toggle><span data-lang-badge>VI</span> / EN</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="wrap">
    <article class="card">
      <div class="small muted" id="crumb"></div>
      <h1 id="title" style="margin-top:10px">Đang tải nội dung…</h1>
      <p class="muted" id="sub" style="line-height:1.7;margin-top:10px"></p>
      <div class="hr"></div>
      <div id="body" class="small" style="line-height:1.95"></div>
    </article>
  </main>

  <script type="module">
    import { mountTopbar, getLang, loadBySlug, renderRichHtml, setSeo } from "/app.js";

    mountTopbar();

    const lang = getLang();
    const T = (vi, en) => lang === "vi" ? vi : en;

    const params = new URLSearchParams(location.search);
    const slug = (params.get("slug") || "about").trim();

    const titleEl = document.getElementById("title");
    const subEl = document.getElementById("sub");
    const bodyEl = document.getElementById("body");
    const crumbEl = document.getElementById("crumb");

    crumbEl.innerHTML = `<a href="/">Trang chủ</a> / <b>${slug}</b>`;

    const FALLBACKS = {
      about: {
        title: T("Giới thiệu", "About"),
        desc: T(
          "Giới thiệu nền tảng Đường Sao Tỏa Sáng.",
          "About the Star Path Light Up platform."
        ),
        body: `
          <p><b>Đường Sao Tỏa Sáng</b> là một nền tảng được xây dựng để kết nối con người, ý tưởng, chương trình và nguồn lực có giá trị thật với nhau theo hướng dài hạn, minh bạch và có thể vận hành thực tế.</p>
          <p>Đây không chỉ là một website giới thiệu. Đây là một hệ thống để những chương trình nghệ thuật, giáo dục, cộng đồng và gây quỹ có thể được tổ chức rõ ràng, công bố công khai, và đi đường dài mà không rơi vào sự rời rạc hay cảm tính.</p>
          <p>Giai đoạn đầu, hệ thống ưu tiên hai hướng chính: <b>kịch bản</b> như một dòng sản phẩm có thể tạo doanh thu bền vững, và <b>gây quỹ minh bạch</b> để hỗ trợ các mục tiêu cộng đồng và tương lai trẻ em.</p>
          <p><b>Star Path Light Up</b> is a platform created to connect people, ideas, programs, and real resources in a long term, transparent, and operational way.</p>
          <p>This is not just an informational website. It is a structured system for artistic, educational, community, and fundraising initiatives to be organized clearly, reported openly, and sustained over time.</p>
          <p>In the first phase, the project prioritizes two main directions: <b>scripts</b> as a sustainable business line, and <b>transparent fundraising</b> to support community and future children initiatives.</p>
        `
      },

      program: {
        title: T("Chương trình", "Program"),
        desc: T(
          "Khung vận hành, mô hình triển khai và lộ trình phát triển.",
          "Operating framework, implementation model, and roadmap."
        ),
        body: `
          <p>Chương trình của Đường Sao Tỏa Sáng được xây dựng theo cấu trúc có mục tiêu, nội dung, dòng lực, cơ chế phối hợp và báo cáo rõ ràng. Mỗi hoạt động đều cần được đặt trong một logic triển khai thực tế thay vì chỉ truyền cảm hứng chung chung.</p>
          <p>Giai đoạn đầu ưu tiên chuẩn hoá nội dung, xây dựng hệ thống kịch bản, cấu trúc gây quỹ minh bạch, và tạo nền tảng cộng đồng có thể đồng hành lâu dài.</p>
          <p>Các mô-đun chính gồm: xuất bản nội dung song ngữ, kịch bản thương mại, chiến dịch donate, kết nối nhà tài trợ, workshop và các chương trình biểu diễn hoặc hội thảo trong tương lai.</p>
          <p>The program is designed with clear goals, content logic, resource flow, collaboration mechanism, and reporting standards. Every activity must be operationally grounded instead of staying at the level of vague inspiration.</p>
          <p>Phase one focuses on content standardization, script system building, transparent fundraising structure, and a community platform for long-term collaboration.</p>
        `
      },

      events: {
        title: T("Sự kiện", "Events"),
        desc: T(
          "Thông tin các sự kiện, hoạt động và kế hoạch công bố theo từng giai đoạn.",
          "Events, activities, and phased announcements."
        ),
        body: `
          <p>Trang này dùng để công bố các hoạt động, sự kiện, workshop, đối thoại, hoặc các buổi ra mắt nội dung trong hệ thống Đường Sao Tỏa Sáng.</p>
          <p>Hiện tại, giai đoạn đầu của dự án chưa ưu tiên bán vé sự kiện, mà tập trung vào hai mảng chính là <b>kịch bản</b> và <b>donate</b>. Vì vậy, các sự kiện sẽ được công bố theo từng đợt khi có lịch trình rõ ràng.</p>
          <p>Các sự kiện trong tương lai có thể bao gồm: biểu diễn nghệ thuật, workshop, gala gây quỹ, hội thảo cộng đồng, và các chương trình kết nối nhà tài trợ hoặc nghệ sĩ.</p>
          <p>This page is used to announce events, workshops, dialogues, or content launches within the Star Path Light Up system.</p>
          <p>At the moment, phase one does not prioritize ticket sales. The main focus is on <b>scripts</b> and <b>donation campaigns</b>. Events will be announced in phases when the schedule becomes clear.</p>
        `
      },

      scripts: {
        title: T("Kịch bản", "Scripts"),
        desc: T(
          "Danh mục kịch bản, gói mua và quyền truy cập.",
          "Script catalog, purchase packages, and access rights."
        ),
        body: `
          <p><b>Kịch bản</b> là dòng sản phẩm ưu tiên trong giai đoạn đầu của Đường Sao Tỏa Sáng. Đây là nền tảng để tạo dòng tiền minh bạch, bền vững, và gắn trực tiếp với giá trị nội dung.</p>
          <p>Kịch bản không chỉ là tài liệu biểu diễn. Nó có thể là sản phẩm nghệ thuật, giáo dục, sân khấu, truyền thông hoặc các cấu trúc kể chuyện có thể được ứng dụng vào nhiều loại hình dự án khác nhau.</p>
          <p>Người dùng có thể mua quyền truy cập hoặc quyền sử dụng theo từng gói, tùy theo mục tiêu cá nhân, tổ chức hoặc doanh nghiệp.</p>
          <p><b>Scripts</b> are the primary product line in phase one. They help create a transparent and sustainable revenue stream directly tied to meaningful content.</p>
          <p>A script is not only a performance document. It can function as an artistic, educational, theatrical, media, or storytelling structure applicable across various types of projects.</p>
        `
      },

      donate: {
        title: T("Gây quỹ / Donate", "Donate / Fundraising"),
        desc: T(
          "Cơ chế donate và gây quỹ minh bạch.",
          "Transparent donation and fundraising mechanism."
        ),
        body: `
          <p>Đường Sao Tỏa Sáng triển khai gây quỹ trên nguyên tắc: có mục tiêu, có lý do sử dụng, có giới hạn trách nhiệm, và có báo cáo công khai theo kỳ.</p>
          <p>Giai đoạn đầu ưu tiên nhận donate theo các chiến dịch rõ ràng và linh hoạt nhiều hình thức thanh toán, bao gồm cả chuyển khoản thủ công và kết nối online theo từng bước.</p>
          <p>Donate không phải là mua lợi nhuận. Donate là hành vi đồng hành cho một mục tiêu có ý nghĩa, với nguyên tắc minh bạch và có thể kiểm tra.</p>
          <p>Star Path Light Up runs fundraising based on clear goals, purpose of use, responsibility scope, and periodic public reporting.</p>
          <p>At this stage, donations are collected through clearly defined campaigns with flexible payment methods, including manual transfer and staged online integration.</p>
        `
      },

      transparency: {
        title: T("Minh bạch", "Transparency"),
        desc: T(
          "Nguyên tắc công khai, báo cáo và kiểm tra.",
          "Principles of disclosure, reporting, and accountability."
        ),
        body: `
          <p>Minh bạch là một trong những trụ cột nền tảng của toàn bộ hệ thống này. Mọi chiến dịch, mọi nguồn lực và mọi đóng góp đều phải có cách ghi nhận, trạng thái, và phương thức công bố rõ ràng.</p>
          <p>Nguyên tắc tối thiểu gồm: mục tiêu rõ, phạm vi sử dụng rõ, dòng tiền rõ, và báo cáo theo kỳ bằng link hoặc tài liệu đính kèm.</p>
          <p>Trang này sẽ là nơi công bố thông tin minh bạch cho các chương trình gây quỹ, tài trợ, và các hoạt động kinh doanh nội dung trong hệ thống.</p>
          <p>Transparency is one of the core pillars of the entire platform. Every campaign, resource, and contribution must have a clear recording method, status, and disclosure mechanism.</p>
          <p>This page is intended to publish transparency information for fundraising campaigns, sponsorships, and content-related business activities.</p>
        `
      },

      legal: {
        title: T("Pháp lý", "Legal"),
        desc: T(
          "Điều khoản sử dụng, chính sách riêng tư và tuyên bố miễn trừ.",
          "Terms of Use, Privacy Policy, and Disclaimer."
        ),
        body: `
          <p>Trang pháp lý của Đường Sao Tỏa Sáng tập hợp các thông tin nền tảng liên quan đến điều khoản sử dụng, chính sách riêng tư, và các nguyên tắc miễn trừ trách nhiệm trong hoạt động gây quỹ hoặc sử dụng nội dung.</p>
          <p>Người dùng khi truy cập, đóng góp hoặc mua các sản phẩm nội dung như kịch bản cần đọc và chấp nhận các điều khoản được công bố tại đây.</p>
          <p>Trong giai đoạn đầu, đây là bản pháp lý nền để bảo đảm website có khung vận hành rõ ràng, tránh hiểu nhầm về bản chất donate, tài trợ, và sử dụng sản phẩm số.</p>
          <p>This legal page includes the foundation information regarding Terms of Use, Privacy Policy, and applicable disclaimers in fundraising and content usage.</p>
          <p>Users who access, contribute to, or purchase digital products such as scripts should read and accept the published terms here.</p>
        `
      },

      contact: {
        title: T("Liên hệ", "Contact"),
        desc: T(
          "Thông tin liên hệ chính thức của dự án.",
          "Official contact information."
        ),
        body: `
          <p>Nếu anh/chị muốn liên hệ để hợp tác, tài trợ, giới thiệu chương trình, đề xuất kịch bản hoặc đồng hành trong các hoạt động cộng đồng, vui lòng sử dụng các kênh chính thức dưới đây.</p>
          <p><b>Email pháp lý:</b> contact@duongsaotoasang.com</p>
          <p><b>Email quản trị tạm thời:</b> duongsaotoasang@gmail.com</p>
          <p><b>Email phản hồi:</b> reply@duongsaotoasang.com</p>
          <p>Please use the official channels below for collaboration, sponsorship, script proposals, or community-related partnerships.</p>
          <p><b>Legal email:</b> contact@duongsaotoasang.com</p>
          <p><b>Temporary admin email:</b> duongsaotoasang@gmail.com</p>
        `
      }
    };

    async function run(){
      const fallback = FALLBACKS[slug] || {
        title: T("Nội dung đang cập nhật", "Content is being updated"),
        desc: T("Trang này đã được tạo nhưng chưa có nội dung hoàn chỉnh.", "This page exists but content is not complete yet."),
        body: `<p>${T("Slug này hiện chưa có nội dung fallback riêng.", "This slug does not yet have a dedicated fallback.")}</p>`
      };

      titleEl.textContent = fallback.title;
      subEl.textContent = fallback.desc;
      bodyEl.innerHTML = fallback.body;

      setSeo({
        title: `${fallback.title} | Đường Sao Tỏa Sáng`,
        description: fallback.desc,
        canonical: `https://duongsaotoasang.com/content?slug=${encodeURIComponent(slug)}`
      });

      try{
        const item = await loadBySlug(slug);
        if(item){
          titleEl.textContent = item.title || fallback.title;
          subEl.textContent = item.excerpt || fallback.desc;
          if(item.body) renderRichHtml(bodyEl, item.body);

          setSeo({
            title: `${titleEl.textContent} | Đường Sao Tỏa Sáng`,
            description: item.excerpt || fallback.desc,
            canonical: `https://duongsaotoasang.com/content?slug=${encodeURIComponent(slug)}`,
            ogImage: item.cover || null
          });
        }
      }catch(e){
        console.warn("CMS fallback used:", e);
      }
    }

    run();
  </script>
</body>
</html>
