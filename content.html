<script type="module">

import { getLang, toggleLang, listContents } from "/app.js";

const lang = getLang()

document.documentElement.lang = lang

document.getElementById("langPill").textContent = lang.toUpperCase()

document.getElementById("toggleLang").onclick = toggleLang

document.getElementById("mobileToggle").onclick = () => {
document.getElementById("mainMenu").classList.toggle("open")
}

const params = new URLSearchParams(location.search)

const slug = params.get("slug") || "about"

function fallbackContent(slug){

const data = {

about:{
title_vi:"Giới thiệu Đường Sao Tỏa Sáng",
title_en:"About Star Path Light Up",
body_vi:`Đường Sao Tỏa Sáng là một hệ thống phát triển các hoạt động văn hóa, nghệ thuật và cộng đồng nhằm lan tỏa những giá trị tích cực trong xã hội.`,
body_en:`Star Path Light Up is a system developing cultural, artistic and community activities that spread positive values in society.`
},

program:{
title_vi:"Chương trình",
title_en:"Programs",
body_vi:`Chương trình tập trung vào các hoạt động sáng tạo, đào tạo và hỗ trợ cộng đồng.`,
body_en:`Programs focus on creative activities, education and community support.`
},

events:{
title_vi:"Sự kiện",
title_en:"Events",
body_vi:`Các sự kiện được tổ chức nhằm kết nối cộng đồng và lan tỏa giá trị tích cực.`,
body_en:`Events are organized to connect communities and spread positive values.`
},

scripts:{
title_vi:"Kịch bản",
title_en:"Scripts",
body_vi:`Kịch bản là một trục quan trọng trong hệ thống phát triển nội dung.`,
body_en:`Scripts are an important axis in the content development system.`
},

donate:{
title_vi:"Gây quỹ",
title_en:"Donate",
body_vi:`Hoạt động gây quỹ nhằm hỗ trợ các chương trình cộng đồng.`,
body_en:`Fundraising activities support community programs.`
},

transparency:{
title_vi:"Minh bạch",
title_en:"Transparency",
body_vi:`Tất cả nguồn quỹ đều được công bố minh bạch.`,
body_en:`All funds are publicly reported for transparency.`
},

legal:{
title_vi:"Pháp lý",
title_en:"Legal",
body_vi:`Thông tin pháp lý và điều khoản sử dụng.`,
body_en:`Legal information and terms of use.`
},

contact:{
title_vi:"Liên hệ",
title_en:"Contact",
body_vi:`Liên hệ với hệ thống Đường Sao Tỏa Sáng.`,
body_en:`Contact the Star Path Light Up system.`
}

}

return data[slug]

}

function render(data){

const title = lang === "vi" ? data.title_vi : data.title_en

const body = lang === "vi" ? data.body_vi : data.body_en

document.title = title + " | Đường Sao Tỏa Sáng"

document.getElementById("title").innerText = title

document.getElementById("body").innerHTML = "<p>"+body+"</p>"

document.getElementById("breadcrumb").innerHTML =
`<a href="/">Trang chủ</a> / <span>${title}</span>`

}

async function run(){

try{

const items = await listContents({
slug
})

if(items && items.length){

render(items[0])

return

}

}catch(e){

}

const fallback = fallbackContent(slug)

if(fallback){

render(fallback)

}else{

document.getElementById("title").innerText="404"

document.getElementById("body").innerHTML="<p>Nội dung không tồn tại</p>"

}

}

run()

</script>

</body>
