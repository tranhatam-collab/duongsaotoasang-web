<script type="module">
  import { getLang, toggleLang, loadBySlug, renderRichHtml, setSeo } from "/app.js";

  const lang = getLang();
  const T = (vi, en) => lang === "vi" ? vi : en;

  document.documentElement.lang = lang;
  document.getElementById("langPill").textContent = lang.toUpperCase();
  document.getElementById("toggleLang").onclick = () => toggleLang();

  document.getElementById("mobileToggle").onclick = () => {
    document.getElementById("mainMenu").classList.toggle("open");
  };

  function resolveSlug(){
    const path = location.pathname.replace(/^\/+|\/+$/g, "");
    const qs = new URLSearchParams(location.search);
    const qSlug = (qs.get("slug") || "").trim();

    // Ưu tiên URL đẹp: /program, /about...
    if(path && path !== "content" && path !== "content.html"){
      return path;
    }

    // Hỗ trợ link cũ: /content?slug=about
    if(qSlug){
      return qSlug;
    }

    return "about";
  }

  const slug = resolveSlug();

  const titleEl = document.getElementById("title");
  const subEl = document.getElementById("sub");
  const bodyEl = document.getElementById("body");
  const crumbEl = document.getElementById("crumb");

  crumbEl.innerHTML = `<a href="/">Trang chủ</a> / <b>${slug}</b>`;

  const FALLBACKS = {
    about: {
      title: T("Giới thiệu", "About"),
      desc: T("Giới thiệu nền tảng Đường Sao Tỏa Sáng.", "About the Star Path Light Up platform."),
      body: `<p>...</p>`
    },
    program: {
      title: T("Chương trình", "Program"),
      desc: T("Khung vận hành, mô hình triển khai và lộ trình phát triển.", "Operating framework, implementation model, and roadmap."),
      body: `<p>...</p>`
    },
    events: {
      title: T("Sự kiện", "Events"),
      desc: T("Thông tin các sự kiện, hoạt động và kế hoạch công bố theo từng giai đoạn.", "Events, activities, and phased announcements."),
      body: `<p>...</p>`
    },
    scripts: {
      title: T("Kịch bản", "Scripts"),
      desc: T("Danh mục kịch bản, gói mua và quyền truy cập.", "Script catalog, purchase packages, and access rights."),
      body: `<p>...</p>`
    },
    donate: {
      title: T("Gây quỹ / Donate", "Donate / Fundraising"),
      desc: T("Cơ chế donate và gây quỹ minh bạch.", "Transparent donation and fundraising mechanism."),
      body: `<p>...</p>`
    },
    transparency: {
      title: T("Minh bạch", "Transparency"),
      desc: T("Nguyên tắc công khai, báo cáo và kiểm tra.", "Principles of disclosure, reporting, and accountability."),
      body: `<p>...</p>`
    },
    legal: {
      title: T("Pháp lý", "Legal"),
      desc: T("Điều khoản sử dụng, chính sách riêng tư và tuyên bố miễn trừ.", "Terms of Use, Privacy Policy, and Disclaimer."),
      body: `<p>...</p>`
    },
    contact: {
      title: T("Liên hệ", "Contact"),
      desc: T("Thông tin liên hệ chính thức của dự án.", "Official contact information."),
      body: `<p>...</p>`
    }
  };

  async function run(){
    const fallback = FALLBACKS[slug] || {
      title: T("Nội dung đang cập nhật", "Content is being updated"),
      desc: T("Trang này đã được tạo nhưng chưa có nội dung hoàn chỉnh.", "This page exists but content is not complete yet."),
      body: `<p>${T("Slug này hiện chưa có nội dung fallback riêng.", "This slug does not yet have a dedicated fallback.")}</p>`
    };

    titleEl.textContent = fallback.title;
    subEl.textContent = fallback.desc;
    bodyEl.innerHTML = fallback.body;

    setSeo({
      title: `${fallback.title} | Đường Sao Tỏa Sáng`,
      description: fallback.desc,
      canonical: `https://duongsaotoasang.com/${encodeURIComponent(slug)}`
    });

    try{
      const item = await loadBySlug(slug);
      if(item){
        titleEl.textContent = item.title || fallback.title;
        subEl.textContent = item.excerpt || fallback.desc;
        if(item.body) renderRichHtml(bodyEl, item.body);

        setSeo({
          title: `${titleEl.textContent} | Đường Sao Tỏa Sáng`,
          description: item.excerpt || fallback.desc,
          canonical: `https://duongsaotoasang.com/${encodeURIComponent(slug)}`,
          ogImage: item.cover || null
        });
      }
    }catch(e){
      console.warn("CMS fallback used:", e);
    }
  }

  run();
</script>
