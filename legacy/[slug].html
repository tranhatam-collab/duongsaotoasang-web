<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b111d">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta name="robots" content="noindex,follow">
  <title id="pageTitle">Câu Chuyện Lưu Trữ | Đường Sao Tỏa Sáng</title>
  <meta name="description" content="Xem câu chuyện lưu trữ kỹ thuật số với video, âm thanh, tài liệu, ảnh, dòng thời gian và cây gia đình.">
  <link rel="canonical" href="https://duongsaotoasang.com/legacy/">
  <link rel="stylesheet" href="/app.css">

  <style>
    :root{
      --bg:#0b111d;
      --bg-alt:#0f172a;
      --panel:rgba(255,255,255,.035);
      --panel-strong:rgba(255,255,255,.055);
      --text:#e2e8f0;
      --muted:#9eb0c8;
      --line:rgba(224,200,150,.14);
      --gold:#e0c896;
      --gold-dark:#c9a66b;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(1000px 620px at 8% 0%, rgba(224,200,150,.14), transparent 60%),
        radial-gradient(880px 520px at 92% 8%, rgba(96,165,250,.14), transparent 58%),
        linear-gradient(180deg,#0b111d 0%, #101827 50%, #0b111d 100%);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    a{color:inherit}
    .wrap{width:min(1200px,calc(100% - 32px));margin:0 auto}
    .skip-link{
      position:absolute;
      left:16px;
      top:-44px;
      z-index:999;
      background:#fff;
      color:#111;
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
      transition:top .2s ease;
    }
    .skip-link:focus{top:16px}

    #siteHeader .site-topbar{
      background:rgba(8,12,19,.82);
      border-bottom:1px solid rgba(224,200,150,.12);
    }

    .hero{padding:40px 0 24px}
    .eyebrow{
      color:var(--gold);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:800;
      margin-bottom:10px;
    }
    h1{
      margin:0;
      font-size:36px;
      line-height:1.08;
      letter-spacing:-.02em;
      color:#f7ead0;
    }
    .lead{
      margin:12px 0 0;
      color:#cbd5e1;
      font-size:16px;
      line-height:1.7;
    }

    .meta{display:flex;gap:16px;flex-wrap:wrap;margin:16px 0;color:var(--muted);font-size:14px}
    .meta-item{display:flex;align-items:center;gap:6px}

    .player-container{
      background:var(--panel-strong);
      border:1px solid var(--line);
      border-radius:20px;
      padding:24px;
      margin:24px 0;
    }
    .video-player{
      width:100%;
      aspect-ratio:16/9;
      background:#000;
      border-radius:12px;
      overflow:hidden;
    }
    .video-player video{width:100%;height:100%;object-fit:contain}

    .timeline-container{margin:32px 0}
    .timeline-container h2{margin:0 0 16px;color:#f7ead0;font-size:24px}
    .timeline{
      position:relative;
      padding-left:32px;
    }
    .timeline::before{
      content:'';
      position:absolute;
      left:8px;
      top:0;
      bottom:0;
      width:2px;
      background:var(--line);
    }
    .timeline-item{
      position:relative;
      margin-bottom:24px;
    }
    .timeline-item::before{
      content:'';
      position:absolute;
      left:-24px;
      top:6px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:var(--gold);
      border:2px solid var(--bg);
    }
    .timeline-year{
      font-size:12px;
      font-weight:700;
      color:var(--gold);
      margin-bottom:4px;
    }
    .timeline-title{
      font-size:16px;
      font-weight:600;
      color:#f8fafc;
      margin-bottom:4px;
    }
    .timeline-desc{
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin:24px 0}
    .media-item{
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:var(--panel);
    }
    .media-item img{width:100%;height:150px;object-fit:cover;display:block}
    .media-item-caption{padding:12px;font-size:13px;color:var(--muted)}

    .notice{
      border:1px solid rgba(251,191,36,.28);
      background:linear-gradient(145deg,rgba(251,191,36,.13),rgba(251,191,36,.04));
      border-radius:20px;
      padding:18px;
      color:#f6e6bd;
      margin:20px 0;
    }
    .notice b{display:block;margin-bottom:6px;color:#f9e5ad;font-size:16px}
    .notice p{margin:0;color:#d8caa8;line-height:1.7;font-size:14px}

    footer{padding:32px 0;text-align:center;color:var(--muted)}
    footer a{color:#f6e6bd;text-decoration:none}
    footer a:hover{text-decoration:underline}

    @media (max-width:640px){
      h1{font-size:24px}
      .player-container{padding:16px}
    }
  </style>  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Đường Sao Tỏa Sáng">
  <meta property="og:title" content="Legacy Story | DSTS">
  <meta property="og:description" content="Câu chuyện di sản của người Việt trên Đường Sao Tỏa Sáng.">
  <meta property="og:url" content="https://duongsaotoasang.com/legacy">
  <meta property="og:image" content="https://duongsaotoasang.com/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Legacy Story | DSTS">
  <meta name="twitter:description" content="Câu chuyện di sản của người Việt trên Đường Sao Tỏa Sáng.">
  <meta name="twitter:image" content="https://duongsaotoasang.com/og.png">
</head>
<body>
  <a class="skip-link" href="#mainContent">Bỏ qua nội dung điều hướng</a>
  <div id="siteHeader"></div>

  <main id="mainContent">
    <section class="hero">
      <div class="wrap">
        <div class="eyebrow">LAYER 2 · DIGITAL LEGACY</div>
        <h1 id="storyTitle">Đang tải...</h1>
        <p class="lead" id="storySummary">...</p>
        <div class="meta">
          <div class="meta-item">📅 <span id="storyDate">...</span></div>
          <div class="meta-item">📍 <span id="storyOrigin">...</span></div>
          <div class="meta-item">📁 <span id="storyType">...</span></div>
        </div>
      </div>
    </section>

    <div class="wrap">
      <div class="notice">
        <b>Thông báo</b>
        <p>Câu chuyện này đang trong quá trình lưu trữ kỹ thuật số. Một số nội dung có thể chưa hoàn thiện.</p>
      </div>

      <div class="player-container" id="playerContainer" style="display:none;">
        <h2>video Lưu Trữ</h2>
        <div class="video-player">
          <video id="videoPlayer" controls>
            <source src="" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ video.
          </video>
        </div>
      </div>

      <div class="timeline-container" id="timelineContainer" style="display:none;">
        <h2>Dòng Thời Gian</h2>
        <div class="timeline" id="timeline">
          <!-- Timeline items loaded dynamically -->
        </div>
      </div>

      <div class="media-grid" id="mediaGrid" style="display:none;">
        <!-- Media items loaded dynamically -->
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <p><strong>Đường Sao Tỏa Sáng · DSTS</strong></p>
      <p>
        <a href="/">Trang chủ</a> ·
        <a href="/legacy">Kho Lưu Trữ</a>
      </p>
    </div>
  </footer>

  <script src="/assets/app-v5.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      DSTS.mountSiteChrome({ active: 'legacy' });

      const slug = window.location.pathname.split('/legacy/')[1];
      if (!slug) {
        window.location.href = '/legacy';
        return;
      }

      async function loadStory() {
        try {
          const response = await fetch(`/api/legacy/story/${slug}`);
          const story = await response.json();

          if (!story || !story.id) {
            document.getElementById('storyTitle').textContent = 'Không tìm thấy câu chuyện';
            return;
          }

          document.getElementById('storyTitle').textContent = story.title;
          document.getElementById('storySummary').textContent = story.summary || '';
          document.getElementById('storyDate').textContent = story.subject_birth_year || 'N/A';
          document.getElementById('storyOrigin').textContent = story.subject_origin || 'N/A';
          document.getElementById('storyType').textContent = story.story_type || 'N/A';
          document.getElementById('pageTitle').textContent = story.title + ' | DSTS';

          if (story.video_url) {
            document.getElementById('playerContainer').style.display = 'block';
            document.getElementById('videoPlayer').src = story.video_url;
          }

          if (story.timeline_json) {
            const timeline = JSON.parse(story.timeline_json);
            if (timeline && timeline.length > 0) {
              document.getElementById('timelineContainer').style.display = 'block';
              document.getElementById('timeline').innerHTML = timeline.map(item => `
                <div class="timeline-item">
                  <div class="timeline-year">${item.year || item.date}</div>
                  <div class="timeline-title">${item.title}</div>
                  <div class="timeline-desc">${item.description || ''}</div>
                </div>
              `).join('');
            }
          }

          if (story.photo_urls_json) {
            const photos = JSON.parse(story.photo_urls_json);
            if (photos && photos.length > 0) {
              document.getElementById('mediaGrid').style.display = 'grid';
              document.getElementById('mediaGrid').innerHTML = photos.map(photo => `
                <div class="media-item">
                  <img src="${photo.url}" alt="${photo.caption || 'Ảnh lưu trữ'}" loading="lazy">
                  <div class="media-item-caption">${photo.caption || ''}</div>
                </div>
              `).join('');
            }
          }

        } catch (err) {
          console.error('Error loading story:', err);
          document.getElementById('storyTitle').textContent = 'Lỗi tải câu chuyện';
        }
      }

      loadStory();
    });
  </script>
</body>
</html>
