<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<main style="max-width:560px;margin:60px auto;padding:0 16px">
  <h1>Đặt lại mật khẩu</h1>
  <p class="small">Nhập mật khẩu mới, không cần mật khẩu cũ.</p>

  <label>Mật khẩu mới</label>
  <input id="p1" type="password" style="width:100%;padding:10px" placeholder="Ít nhất 8 ký tự"/>

  <label style="display:block;margin-top:10px">Nhập lại</label>
  <input id="p2" type="password" style="width:100%;padding:10px" placeholder="Nhập lại mật khẩu"/>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
    <button id="save">Lưu</button>
    <a href="/account/index.html">Về đăng nhập</a>
  </div>

  <p id="msg" class="small" style="margin-top:10px"></p>
</main>

<script type="module">
  import { supabase, esc } from "./account.js";
  const msg = document.getElementById("msg");
  const setMsg = t => msg.innerHTML = esc(t);

  document.getElementById("save").onclick = async () => {
    const p1 = document.getElementById("p1").value || "";
    const p2 = document.getElementById("p2").value || "";
    if(p1.length < 8){ setMsg("Mật khẩu tối thiểu 8 ký tự."); return; }
    if(p1 !== p2){ setMsg("Mật khẩu nhập lại không khớp."); return; }

    setMsg("Đang lưu...");
    const { error } = await supabase.auth.updateUser({ password: p1 });
    if(error){ setMsg("Error: " + error.message); return; }
    setMsg("Đã đổi mật khẩu. Đang chuyển...");
    setTimeout(()=> location.href="/account/scripts.html", 700);
  };
</script>
</body>
</html>
