<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b111d">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta name="robots" content="noindex,follow">
  <title>Đã ghi danh | DSTS Club — Đường Sao Tỏa Sáng</title>
  <meta name="description" content="Cảm ơn bạn đã ghi danh DSTS Club. Chúng tôi sẽ liên hệ khi chính thức mở cửa.">
  <link rel="canonical" href="https://duongsaotoasang.com/club/join-success">
  <link rel="stylesheet" href="/app.css">
  <style>
    .success-wrap{max-width:560px;margin:0 auto;text-align:center;padding:80px 20px}
    .success-icon{width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px;color:#86efac}
    .success-wrap h1{font-size:32px;color:#f5e7c7;margin:0 0 12px;letter-spacing:-.02em}
    .success-wrap p{color:var(--muted);font-size:16px;line-height:1.8;margin:0 0 28px}
    .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 20px;border:1px solid var(--line);border-radius:14px;color:#f5e7c7;text-decoration:none;background:rgba(255,255,255,.04);font-weight:700;font-size:15px}
    .btn.primary{border-color:rgba(216,188,119,.32);background:rgba(216,188,119,.12)}
    @media (max-width:760px){.success-wrap h1{font-size:26px}}
  </style>
</head>
<body>
  <div id="siteHeader"></div>
  <main>
    <div class="wrap success-wrap">
      <div class="success-icon">&#10003;</div>
      <h1>Đã ghi danh thành công</h1>
      <p>Cảm ơn bạn đã quan tâm đến DSTS Club. Chúng tôi đã nhận được thông tin và sẽ liên hệ qua email khi chính thức mở cửa.</p>
      <div class="btn-row">
        <a href="/" class="btn primary">Về trang chủ</a>
        <a href="/club" class="btn">Tìm hiểu DSTS Club</a>
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <div class="wrap site-footer-inner">
      <p>&copy; 2026 Đường Sao Tỏa Sáng &middot; DSTS</p>
    </div>
  </footer>
  <script src="/assets/app-v5.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      DSTS.mountSiteChrome({ active: "club" });
    });
  </script>
</body>
</html>
