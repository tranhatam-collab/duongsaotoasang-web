<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng Ký — Tạo Tài Khoản DSTS</title>
<meta name="description" content="Đăng ký tài khoản DSTS để tham gia Câu Lạc Bộ, tích điểm Điểm Sao, kết nối người hướng dẫn, và truy cập nội dung độc quyền.">
<link rel="alternate" hreflang="en" href="https://duongsaotoasang.com/en/register">
<link rel="canonical" href="https://duongsaotoasang.com/register">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<main class="container" style="max-width:480px;margin:0 auto;padding:40px 20px;">
  <h1>Tạo Tài Khoản DSTS</h1>
  <p class="lead">Một tài khoản cho toàn bộ hệ sinh thái: Câu Lạc Bộ, Mạng Lưới Người Hướng Dẫn, Nuôi Dưỡng Ước Mơ, Nội Dung.</p>

  <form id="register-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="ten@example.com">

    <label for="password">Mật khẩu</label>
    <input type="password" id="password" name="password" required minlength="8" placeholder="Ít nhất 8 ký tự">

    <label for="display_name">Tên hiển thị</label>
    <input type="text" id="display_name" name="display_name" required placeholder="Tên bạn muốn hiển thị">

    <label>
      <input type="checkbox" id="agree_terms" name="agree_terms" required>
      Tôi đồng ý với <a href="/terms.html" target="_blank">Điều Khoản Sử Dụng</a> và <a href="/privacy.html" target="_blank">Chính Sách Bảo Mật</a>
    </label>

    <label>
      <input type="checkbox" id="agree_age" name="agree_age" required>
      Tôi xác nhận đã đủ 18 tuổi, hoặc có sự đồng ý của người giám hộ
    </label>

    <button type="submit" class="btn btn-primary">Tạo tài khoản</button>
  </form>

  <p>Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
  <div id="message"></div>
</main>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = document.getElementById('message');
  message.textContent = 'Đang tạo tài khoản...';
  message.style.color = '#9eb0c8';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  
  // Remove role from data (force role='member' server-side)
  delete data.role;

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();

    if (result.ok) {
      message.textContent = 'Tài khoản đã tạo! Đang chuyển hướng...';
      message.style.color = '#74e274';
      setTimeout(() => window.location.href = '/account', 1000);
    } else {
      message.textContent = result.error || 'Tạo tài khoản thất bại';
      message.style.color = '#f87171';
    }
  } catch (err) {
    message.textContent = 'Lỗi kết nối';
    message.style.color = '#f87171';
  }
});
</script>
</body>
</html>
