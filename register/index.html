<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng Ký — Tạo Tài Khoản DSTS</title>
<meta name="description" content="Đăng ký tài khoản DSTS để tham gia Câu Lạc Bộ, tích điểm Điểm Sao, kết nối người hướng dẫn, và truy cập nội dung độc quyền.">
<link rel="alternate" hreflang="en" href="https://duongsaotoasang.com/en/register">
<link rel="canonical" href="https://duongsaotoasang.com/register">
<link rel="stylesheet" href="/app.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .google-btn { display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1px solid rgba(224,200,150,.2);border-radius:10px;background:rgba(224,200,150,.06);color:#e2e8f0;cursor:pointer;font-size:15px;transition:background .15s}
    .google-btn:hover { background:rgba(224,200,150,.12) }
    .google-btn svg { width:18px;height:18px }
    .divider { display:flex;align-items:center;gap:12px;margin:20px 0;color:#64748b;font-size:13px }
    .divider::before,.divider::after { content:"";flex:1;height:1px;background:rgba(224,200,150,.12) }
    .link { color:#e0c896;text-decoration:none }
    .link:hover { text-decoration:underline }
  </style>
  <meta name="robots" content="noindex,follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Đường Sao Tỏa Sáng">
  <meta property="og:title" content="Register | DSTS">
  <meta property="og:description" content="Register for Đường Sao Tỏa Sáng. — Đường Sao Tỏa Sáng là nền tảng nội dung và cộng đồng người Việt toàn cầu.">
  <meta property="og:url" content="https://duongsaotoasang.com/register">
  <meta property="og:image" content="https://duongsaotoasang.com/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Register | DSTS">
  <meta name="twitter:description" content="Register for Đường Sao Tỏa Sáng. — Đường Sao Tỏa Sáng là nền tảng nội dung và cộng đồng người Việt toàn cầu.">
  <meta name="twitter:image" content="https://duongsaotoasang.com/og.png">
</head>
<body>
<main class="container" style="max-width:480px;margin:0 auto;padding:40px 20px;">
  <h1>Tạo Tài Khoản DSTS</h1>
  <p class="lead">Một tài khoản cho toàn bộ hệ sinh thái: Câu Lạc Bộ, Mạng Lưới Người Hướng Dẫn, Nuôi Dưỡng Ước Mơ, Nội Dung.</p>

  <button class="google-btn" id="google-signup" type="button">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Đăng ký bằng Google
  </button>

  <div class="divider">hoặc</div>

  <form id="register-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="ten@example.com">

    <label for="password">Mật khẩu</label>
    <input type="password" id="password" name="password" required minlength="8" placeholder="Ít nhất 8 ký tự">

    <label for="display_name">Tên hiển thị</label>
    <input type="text" id="display_name" name="display_name" required placeholder="Tên bạn muốn hiển thị">

    <label>
      <input type="checkbox" id="agree_terms" name="agree_terms" required>
      Tôi đồng ý với <a href="/terms.html" target="_blank">Điều Khoản Sử Dụng</a> và <a href="/privacy.html" target="_blank">Chính Sách Bảo Mật</a>
    </label>

    <label>
      <input type="checkbox" id="agree_age" name="agree_age" required>
      Tôi xác nhận đã đủ 18 tuổi, hoặc có sự đồng ý của người giám hộ
    </label>

    <button type="submit" class="btn btn-primary">Tạo tài khoản</button>
  </form>

  <p>Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
  <div id="message"></div>
</main>

<script>
const message = document.getElementById('message');
function showMsg(text, isErr) {
  message.textContent = text;
  message.style.color = isErr ? '#f87171' : '#74e274';
}

// Google Sign Up
let googleClientId = null;
async function initGoogle() {
  try {
    const res = await fetch('/api/auth/google-config');
    const cfg = await res.json();
    if (cfg.client_id) googleClientId = cfg.client_id;
  } catch (e) { console.warn('google-config failed', e); }
}
initGoogle();

document.getElementById('google-signup').addEventListener('click', () => {
  if (typeof google === 'undefined') { showMsg('Google login chưa sẵn sàng.', true); return; }
  if (!googleClientId) { showMsg('Google OAuth chưa được cấu hình.', true); return; }
  google.accounts.id.initialize({ client_id: googleClientId, callback: handleGoogleCredential });
  google.accounts.id.prompt();
});

async function handleGoogleCredential(response) {
  showMsg('Đang xác thực Google...', false);
  try {
    const res = await fetch('/api/auth/google-callback', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential })
    });
    const result = await res.json();
    if (result.ok) {
      if (result.requires_2fa) {
        window.location.href = '/account/2fa-setup';
      } else {
        showMsg('Đăng ký thành công! Đang chuyển hướng...', false);
        setTimeout(() => window.location.href = '/account', 800);
      }
    } else {
      showMsg(result.error || 'Đăng ký thất bại', true);
    }
  } catch (err) { showMsg('Lỗi kết nối', true); }
}

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  showMsg('Đang tạo tài khoản...', false);

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  delete data.role;

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();

    if (result.ok) {
      showMsg('Tài khoản đã tạo! Đang chuyển hướng...', false);
      setTimeout(() => window.location.href = '/account', 1000);
    } else {
      showMsg(result.error || 'Tạo tài khoản thất bại', true);
    }
  } catch (err) {
    showMsg('Lỗi kết nối', true);
  }
});
</script>
</body>
</html>
