<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <title>Offline - DSTS Club</title>
  <meta name="description" content="You are currently offline. Please check your internet connection and try again.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0f0f1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;

      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .offline-container {
      max-width: 400px;
      width: 100%;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      opacity: 0.5;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #e94560;
    }
    p {
      color: #a0a0a0;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #1a1a2e;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      border: 1px solid #2a2a4a;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
