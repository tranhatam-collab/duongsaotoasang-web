name = "duongsaotoasang-com-v2"
compatibility_date = "2026-03-09"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "cf-d1-dsts-content-prod"
database_id = "de526895-6824-469b-809c-abcd052d9312"
migrations_dir = "migrations"

[vars]
# Payment routing — pay.iai.one canonical gateway
PAY_IAI_ONE_BASE_URL        = "https://pay.iai.one"
PAY_IAI_ONE_TENANT_CODE     = "dsts"
PAY_IAI_ONE_SITE_CODE       = "duongsaotoasang"
PAY_IAI_ONE_PROVIDER        = "payos"
PAY_IAI_ONE_CALLBACK_BASE   = "https://duongsaotoasang.com"
MAIL_API_BASE_URL           = "https://mail.iai.one/_mail/v1"
EMAIL_FROM                  = "DSTS <hello@duongsaotoasang.com>"
EMAIL_FROM_NOREPLY          = "DSTS <noreply@duongsaotoasang.com>"
SUPPORT_EMAIL               = "support@duongsaotoasang.com"
# Required secrets (wrangler pages secret put <NAME> --project-name duongsaotoasang-com-v2):
#   PAY_IAI_ONE_API_KEY  — from Team Pay (tenant: dsts, site: duongsaotoasang)
#   PAY_DSTS_HMAC        — openssl rand -hex 32
#   MAIL_API_KEY         — from mail.iai.one (for donation receipt automation)
#   MAIL_API_WORKSPACE_ID — paired workspace id for MAIL_API_KEY (secret, not in vars)
#   POLL_TOKEN           — openssl rand -hex 32 (auth for POST /api/donate/poll)
