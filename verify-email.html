<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác thực email | Đường Sao Tỏa Sáng</title>
<link rel="canonical" href="https://duongsaotoasang.com/verify-email">
<meta name="robots" content="noindex,follow">
<link rel="stylesheet" href="/app.css">
<style>
  .verify-container { max-width: 480px; margin: 80px auto; padding: 40px 28px; text-align: center; }
  .verify-icon { font-size: 48px; margin-bottom: 20px; }
  .verify-title { font-size: 1.5rem; color: var(--text, #f0e4c8); margin: 0 0 16px; }
  .verify-msg { color: var(--muted, #94a3b8); line-height: 1.7; margin: 0 0 24px; }
  .verify-btn { display: inline-block; background: #e0c896; color: #0b111d; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
  .verify-status { padding: 16px; border-radius: 8px; margin: 20px 0; }
  .verify-status.success { background: rgba(34,197,94,0.1); color: #4ade80; }
  .verify-status.error { background: rgba(239,68,68,0.1); color: #f87171; }
  .verify-status.loading { background: rgba(224,200,150,0.1); color: #e0c896; }
</style>
</head>
<body>
<header id="siteHeader"></header>
<main class="verify-container">
  <div id="verify-content">
    <div class="verify-icon">📧</div>
    <h1 class="verify-title">Đang xác thực email...</h1>
    <div class="verify-status loading" id="verify-status">Vui lòng đợi trong giây lát.</div>
  </div>
</main>
<script src="/assets/app-v5.js"></script>
<script>
async function verifyEmail() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const statusEl = document.getElementById('verify-status');
  const contentEl = document.getElementById('verify-content');

  if (!token) {
    contentEl.innerHTML = `
      <div class="verify-icon">⚠️</div>
      <h1 class="verify-title">Thiếu token xác thực</h1>
      <div class="verify-status error">Link xác thực không hợp lệ. Vui lòng kiểm tra lại email của bạn.</div>
      <a href="/login" class="verify-btn">Về trang đăng nhập</a>
    `;
    return;
  }

  try {
    const res = await fetch('/api/auth/verify-email?token=' + encodeURIComponent(token));
    const data = await res.json();
    if (data.ok) {
      contentEl.innerHTML = `
        <div class="verify-icon">✅</div>
        <h1 class="verify-title">Email đã xác thực!</h1>
        <div class="verify-status success">${data.message || 'Tài khoản đã được kích hoạt.'}</div>
        <a href="/login" class="verify-btn">Đăng nhập ngay</a>
      `;
    } else {
      const isExpired = data.error === 'TOKEN_EXPIRED';
      contentEl.innerHTML = `
        <div class="verify-icon">❌</div>
        <h1 class="verify-title">Xác thực thất bại</h1>
        <div class="verify-status error">${data.message || 'Token không hợp lệ.'}</div>
        ${isExpired ? '<button class="verify-btn" id="resend-btn" onclick="resendEmail()">Gửi lại email</button>' : ''}
        <a href="/login" class="verify-btn" style="margin-left:12px">Về trang đăng nhập</a>
      `;
    }
  } catch (e) {
    contentEl.innerHTML = `
      <div class="verify-icon">⚠️</div>
      <h1 class="verify-title">Lỗi kết nối</h1>
      <div class="verify-status error">Không thể kết nối đến server. Vui lòng thử lại sau.</div>
      <a href="/login" class="verify-btn">Về trang đăng nhập</a>
    `;
  }
}

async function resendEmail() {
  const btn = document.getElementById('resend-btn');
  if (btn) { btn.textContent = 'Đang gửi...'; btn.disabled = true; }
  // Resend requires email — for security, redirect to login with prompt
  window.location.href = '/login?msg=verify_expired';
}

verifyEmail();
</script>
</body>
</html>
