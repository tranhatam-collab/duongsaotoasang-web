<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Member Login</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <main style="max-width:560px;margin:60px auto;padding:0 16px">
    <h1>Khu Thành Viên</h1>
    <p>Đăng nhập bằng Magic Link hoặc Password (nếu đã có).</p>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin:12px 0">
      <button id="tabMagic">Magic Link</button>
      <button id="tabPass">Password</button>
    </div>

    <div id="magic">
      <label>Email</label>
      <input id="emailM" style="width:100%;padding:10px" placeholder="you@email.com">
      <button id="sendM" style="margin-top:10px">Gửi Magic Link</button>
    </div>

    <div id="pass" style="display:none">
      <label>Email</label>
      <input id="emailP" style="width:100%;padding:10px" placeholder="you@email.com">
      <label style="display:block;margin-top:10px">Mật khẩu</label>
      <input id="pwd" type="password" style="width:100%;padding:10px" placeholder="••••••••">
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
        <button id="loginP">Đăng nhập</button>
        <button id="forgotP">Quên mật khẩu</button>
      </div>
    </div>

    <p id="msg" style="margin-top:12px"></p>
  </main>

<script type="module">
  import { supabase, esc } from "./member.js";
  const msg = document.getElementById("msg");

  const magic = document.getElementById("magic");
  const pass = document.getElementById("pass");
  document.getElementById("tabMagic").onclick = () => { magic.style.display=""; pass.style.display="none"; msg.textContent=""; };
  document.getElementById("tabPass").onclick = () => { magic.style.display="none"; pass.style.display=""; msg.textContent=""; };

  // auto redirect if session exists
  const { data: sess } = await supabase.auth.getSession();
  if(sess?.session) location.href = "/member/portal.html";

  document.getElementById("sendM").onclick = async () => {
    msg.textContent = "Sending...";
    const email = (document.getElementById("emailM").value||"").trim();
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: `${location.origin}/member/portal.html` }
    });
    msg.textContent = error ? ("Error: " + error.message) : "Đã gửi Magic Link. Kiểm tra email.";
  };

  document.getElementById("loginP").onclick = async () => {
    msg.textContent = "Logging in...";
    const email = (document.getElementById("emailP").value||"").trim();
    const password = (document.getElementById("pwd").value||"");
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error){ msg.textContent = "Error: " + error.message; return; }
    location.href = "/member/portal.html";
  };

  document.getElementById("forgotP").onclick = async () => {
    msg.textContent = "Sending reset email...";
    const email = (document.getElementById("emailP").value||"").trim();
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: `${location.origin}/member/reset.html`
    });
    msg.textContent = error ? ("Error: " + error.message) : "Đã gửi mail reset. Kiểm tra email.";
  };
</script>
</body>
</html>
