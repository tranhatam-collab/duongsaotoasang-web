<main class="container-small">
  <h1>Đặt Lại Mật Khẩu</h1>
  <p class="lead">Nhập mật khẩu mới cho tài khoản của bạn.</p>

  <form id="reset-form">
    <input type="hidden" id="token" name="token">
    <label for="password">Mật khẩu mới</label>
    <input type="password" id="password" name="password" required minlength="8" placeholder="Ít nhất 8 ký tự">
    <label for="password_confirm">Xác nhận mật khẩu</label>
    <input type="password" id="password_confirm" required minlength="8" placeholder="Nhập lại mật khẩu">
    <button type="submit" class="btn btn-primary">Cập nhật mật khẩu</button>
  </form>

  <p><a href="/login" class="link">Quay lại đăng nhập</a></p>
  <div id="message"></div>
</main>

<script>
const message = document.getElementById('message');
function showMsg(text, isErr) {
  message.textContent = text;
  message.style.color = isErr ? '#f87171' : '#74e274';
}

// Extract token from URL
const params = new URLSearchParams(window.location.search);
document.getElementById('token').value = params.get('token') || '';
if (!params.get('token')) {
  showMsg('Liên kết không hợp lệ. Vui lòng yêu cầu liên kết mới.', true);
  document.getElementById('reset-form').style.display = 'none';
}

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('password').value;
  const confirm = document.getElementById('password_confirm').value;
  if (pwd !== confirm) { showMsg('Mật khẩu không khớp', true); return; }
  showMsg('Đang cập nhật...', false);
  try {
    const res = await fetch('/api/auth/reset-verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: document.getElementById('token').value, new_password: pwd })
    });
    const result = await res.json();
    if (result.ok) {
      showMsg('Mật khẩu đã cập nhật! Chuyển hướng...', false);
      setTimeout(() => window.location.href = '/login', 1500);
    } else {
      showMsg(result.error || 'Có lỗi xảy ra', true);
    }
  } catch (err) { showMsg('Lỗi kết nối', true); }
});
</script>
