<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quên Mật Khẩu | DSTS</title>
<meta name="description" content="Đặt lại mật khẩu tài khoản DSTS.">
<link rel="canonical" href="https://duongsaotoasang.com/account/password-reset">
<link rel="stylesheet" href="/app.css">
  <meta name="robots" content="noindex,follow">
  <style>
    .container-small { max-width:480px;margin:0 auto;padding:40px 20px }
    .link { color:#e0c896;text-decoration:none }
    .link:hover { text-decoration:underline }
  </style>
</head>
<body>
<main class="container-small">
  <h1>Quên Mật Khẩu</h1>
  <p class="lead">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>

  <form id="reset-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="ten@example.com">
    <button type="submit" class="btn btn-primary">Gửi liên kết</button>
  </form>

  <p><a href="/login" class="link">Quay lại đăng nhập</a></p>
  <div id="message"></div>
</main>

<script>
const message = document.getElementById('message');
function showMsg(text, isErr) {
  message.textContent = text;
  message.style.color = isErr ? '#f87171' : '#74e274';
}

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  showMsg('Đang gửi...', false);
  try {
    const res = await fetch('/api/auth/reset-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value.trim() })
    });
    const result = await res.json();
    showMsg(result.message || (result.ok ? 'Đã gửi email!' : 'Có lỗi xảy ra'), !result.ok);
  } catch (err) { showMsg('Lỗi kết nối', true); }
});
</script>
</body>
</html>
