<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kịch bản</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<main style="max-width:920px;margin:60px auto;padding:0 16px">
  <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
    <div>
      <h1>Kịch bản của bạn</h1>
      <p class="small">Tự động mở khoá khi có giao dịch “script” thành công.</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a href="/account/profile.html">Profile</a>
      <a href="/account/history.html">Lịch sử</a>
      <button id="logout">Đăng xuất</button>
    </div>
  </div>

  <div id="box" style="margin-top:14px"></div>
</main>

<script type="module">
  import { supabase, esc, requireLogin, logout, logLocalView } from "./account.js";
  const me = await requireLogin();
  document.getElementById("logout").onclick = logout;

  const box = document.getElementById("box");

  function card(html){
    return `<div style="padding:16px;border:1px solid rgba(255,255,255,.12);border-radius:14px;margin-top:12px">${html}</div>`;
  }

  async function hasScriptPayment(){
    const { data, error } = await supabase
      .from("payments")
      .select("id, status, type, created_at")
      .eq("type","script")
      .eq("status","success")
      .order("created_at",{ascending:false})
      .limit(1);

    if(error) return { ok:false, err:error.message };
    return { ok: (data && data.length>0), last: data?.[0] || null };
  }

  async function loadPaidScripts(){
    // LƯU Ý: bảng contents của anh dùng: type, title_vi, title_en...
    const { data, error } = await supabase
      .from("contents")
      .select("id, slug, title_vi, title_en, type, visibility, status")
      .eq("type","script")
      .eq("visibility","paid")
      .eq("status","published")
      .order("created_at",{ascending:false});

    if(error) return { data:null, error:error.message };
    return { data:data||[], error:null };
  }

  // 1) check payment
  const pay = await hasScriptPayment();
  if(pay.err){
    box.innerHTML = card(`<div class="err">Payments error: ${esc(pay.err)}</div>`);
    return;
  }

  if(!pay.ok){
    box.innerHTML = card(`
      <h3>Chưa có giao dịch kịch bản</h3>
      <p class="small">Anh/chị cần mua kịch bản để mở khoá phần này. (Giai đoạn 1: ghi nhận giao dịch qua admin.)</p>
      <p class="small">Email đang đăng nhập: <b>${esc(me.email||"")}</b></p>
    `);
    return;
  }

  // 2) load scripts
  const res = await loadPaidScripts();
  if(res.error){
    box.innerHTML = card(`<div class="err">Contents error: ${esc(res.error)}</div>`);
    return;
  }

  if(res.data.length === 0){
    box.innerHTML = card(`
      <h3>Đã mở khoá, nhưng chưa có kịch bản trả phí nào</h3>
      <p class="small">Hãy tạo content: type='script', visibility='paid', status='published'.</p>
    `);
    return;
  }

  const items = res.data.map(x => {
    const t = x.title_vi || x.slug;
    const url = `/${x.slug}`;
    return `
      <div style="padding:12px;border:1px solid rgba(255,255,255,.10);border-radius:12px;margin-top:10px">
        <div style="font-weight:700">${esc(t)}</div>
        <div class="small">${esc(x.slug)} • paid script</div>
        <div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap">
          <a href="${url}" data-slug="${esc(x.slug)}" data-title="${esc(t)}" class="btn">Mở</a>
          <button class="btn" data-copy="${url}">Copy link</button>
        </div>
      </div>
    `;
  }).join("");

  box.innerHTML = card(`<h3>Danh sách kịch bản</h3>${items}`);

  // track + copy link
  box.addEventListener("click", (e) => {
    const a = e.target.closest("a[data-slug]");
    if(a){
      logLocalView({ slug: a.dataset.slug, title_vi: a.dataset.title, type: "script" });
    }
    const b = e.target.closest("button[data-copy]");
    if(b){
      navigator.clipboard.writeText(location.origin + b.dataset.copy);
      alert("Đã copy link.");
    }
  });
</script>
</body>
</html>
