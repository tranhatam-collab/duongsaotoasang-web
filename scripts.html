  <link rel="stylesheet" href="/app.css">

  <style>
    body.scripts-page{
      background:
        radial-gradient(1200px 760px at 12% 0%, rgba(224,200,150,.15), transparent 60%),
        radial-gradient(920px 620px at 88% 8%, rgba(96,165,250,.14), transparent 58%),
        radial-gradient(760px 520px at 50% 100%, rgba(167,139,250,.10), transparent 62%),
        linear-gradient(180deg,#0b111d 0%, #101827 48%, #0b111d 100%);
    }

    #siteHeader .site-topbar{
      background:rgba(8,12,19,.72);
      border-bottom:1px solid rgba(224,200,150,.10);
      box-shadow:0 18px 60px rgba(0,0,0,.26);
    }

    #siteHeader .site-menu{
      gap:10px;
      padding:8px;
      border:1px solid rgba(224,200,150,.10);
      background:rgba(255,255,255,.025);
      border-radius:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    #siteHeader .site-menu a{
      height:44px;
      padding:0 16px;
      color:#bfc9d7;
      border-radius:14px;
      font-weight:600;
    }

    #siteHeader .site-menu a:hover{
      color:#fff6df;
      background:rgba(224,200,150,.10);
      border-color:rgba(224,200,150,.18);
    }

    #siteHeader .site-menu a.active{
      color:#fff3d1;
      background:linear-gradient(180deg, rgba(224,200,150,.22), rgba(224,200,150,.10));
      border-color:rgba(224,200,150,.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 8px 24px rgba(224,200,150,.10);
    }

    #siteHeader .site-lang a{
      background:rgba(255,255,255,.03);
      border-color:rgba(224,200,150,.10);
      color:#bfc9d7;
    }

    #siteHeader .site-lang a.active{
      color:#fff6df;
      background:linear-gradient(180deg, rgba(224,200,150,.20), rgba(224,200,150,.10));
      border-color:rgba(224,200,150,.30);
      box-shadow:0 8px 20px rgba(224,200,150,.10);
    }

    .hero{
      padding:40px 0 20px;
    }

    .hero-card{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(224,200,150,.14);
      border-radius:34px;
      background:
        radial-gradient(980px 420px at 12% 0%, rgba(224,200,150,.16), transparent 62%),
        radial-gradient(860px 360px at 88% 8%, rgba(96,165,250,.16), transparent 62%),
        radial-gradient(760px 300px at 52% 100%, rgba(167,139,250,.10), transparent 66%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.018));
      box-shadow:0 28px 80px rgba(0,0,0,.42);
      padding:34px;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      inset:auto -110px -110px auto;
      width:340px;
      height:340px;
      background:radial-gradient(circle, rgba(224,200,150,.18), transparent 62%);
      filter:blur(18px);
      pointer-events:none;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:24px;
      align-items:stretch;
    }

    .eyebrow{
      font-size:12px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:#e6c989;
      margin-bottom:10px;
    }

    .hero-title{
      margin:0;
      font-size:56px;
      line-height:1.02;
      letter-spacing:-.04em;
      max-width:980px;
      color:#f5e7c7;
      text-shadow:0 6px 28px rgba(224,200,150,.14);
    }

    .lead{
      margin:18px 0 0;
      color:#aeb8c8;
      line-height:1.95;
      font-size:17px;
      max-width:900px;
    }

    .hero-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:28px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:52px;
      padding:0 18px;
      border-radius:18px;
      border:1px solid rgba(224,200,150,.14);
      background:rgba(255,255,255,.035);
      color:#f5f7fb;
      cursor:pointer;
      transition:all .26s ease;
      font-weight:600;
      font-size:14px;
      box-shadow:0 12px 30px rgba(0,0,0,.16);
      text-decoration:none;
    }

    .btn:hover{
      background:rgba(255,255,255,.08);
      transform:translateY(-2px);
      border-color:rgba(224,200,150,.22);
    }

    .btn.primary{
      color:#fff5de;
      border-color:rgba(224,200,150,.30);
      background:linear-gradient(180deg, rgba(224,200,150,.24), rgba(224,200,150,.10));
      box-shadow:0 14px 34px rgba(224,200,150,.16);
    }

    .btn.primary:hover{
      background:linear-gradient(180deg, rgba(224,200,150,.30), rgba(224,200,150,.14));
      box-shadow:0 18px 38px rgba(224,200,150,.22);
    }

    .hero-kpis{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:28px;
    }

    .kpi{
  min-width:176px;
  border:1px solid rgba(224,200,150,.12);
  background:rgba(255,255,255,.028);
  border-radius:20px;
  padding:16px;
  transition:all .26s ease;
}

.kpi:hover{
  transform:translateY(-3px);
  border-color:rgba(224,200,150,.24);
  background:rgba(255,255,255,.05);
}

.kpi b{
  display:block;
  font-size:22px;
  line-height:1.1;
  color:#f6e6bd;
}

.kpi span{
  display:block;
  margin-top:6px;
  font-size:13px;
  color:#aeb8c8;
  line-height:1.62;
}

.hero-side{
  display:grid;
  gap:16px;
}

.info-card{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(224,200,150,.12);
  background:rgba(255,255,255,.032);
  border-radius:26px;
  padding:22px;
  box-shadow:0 18px 44px rgba(0,0,0,.26);
  transition:all .28s ease;
}

.info-card:hover{
  transform:translateY(-4px);
  border-color:rgba(224,200,150,.22);
  background:rgba(255,255,255,.046);
}

.info-card::before{
  content:"";
  position:absolute;
  inset:-1px;
  background:
    radial-gradient(circle at top right, rgba(224,200,150,.16), transparent 26%),
    radial-gradient(circle at left bottom, rgba(167,139,250,.12), transparent 28%);
  pointer-events:none;
}

.info-card h2{
  margin:0 0 10px;
  font-size:22px;
  line-height:1.24;
  color:#f8fafc;
}

.muted{
  color:#aeb8c8;
  line-height:1.86;
}

.section{
  padding:18px 0 10px;
  scroll-margin-top:110px;
}

.section-head{
  display:flex;
  align-items:end;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.section-head h2{
  margin:0;
  font-size:32px;
  line-height:1.08;
  letter-spacing:-.028em;
  color:#f5e7c7;
}

.section-head p{
  margin:0;
  color:#aeb8c8;
  max-width:820px;
  line-height:1.9;
  font-size:16px;
}

.script-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:18px;
}

.script-card{
  border:1px solid rgba(224,200,150,.12);
  border-radius:24px;
  overflow:hidden;
  background:rgba(255,255,255,.03);
  transition:all .28s ease;
  box-shadow:0 16px 42px rgba(0,0,0,.22);
}

.script-card:hover{
  transform:translateY(-6px);
  border-color:rgba(224,200,150,.24);
  box-shadow:0 22px 54px rgba(224,200,150,.10);
  background:rgba(255,255,255,.045);
}

.script-cover{
  height:190px;
  background:
    radial-gradient(circle at 20% 20%, rgba(224,200,150,.20), transparent 34%),
    linear-gradient(135deg, rgba(96,165,250,.24), rgba(167,139,250,.20));
  border-bottom:1px solid rgba(224,200,150,.10);
}

.script-body{
  padding:20px;
}

.script-type{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(224,200,150,.14);
  color:#e6c989;
  background:rgba(224,200,150,.06);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:10px;
}

.script-title{
  margin:0;
  font-size:22px;
  line-height:1.32;
  letter-spacing:-.02em;
  color:#f8fafc;
}

.script-excerpt{
  margin:12px 0 0;
  color:#aeb8c8;
  font-size:15px;
  line-height:1.8;
}

.script-meta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
  padding-top:10px;
  border-top:1px solid rgba(224,200,150,.10);
  color:#94a3b8;
  font-size:13px;
}
