<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<main style="max-width:720px;margin:60px auto;padding:0 16px">
  <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
    <h1>Profile khách hàng</h1>
    <button id="logout">Đăng xuất</button>
  </div>

  <div style="padding:16px;border:1px solid rgba(255,255,255,.12);border-radius:14px">
    <p class="small">Email: <span id="email"></span></p>

    <label>Họ tên</label>
    <input id="full_name" style="width:100%;padding:10px"/>

    <label style="display:block;margin-top:10px">Số điện thoại</label>
    <input id="phone" style="width:100%;padding:10px"/>

    <label style="display:block;margin-top:10px">Facebook</label>
    <input id="facebook" style="width:100%;padding:10px" placeholder="https://facebook.com/..."/>

    <label style="display:block;margin-top:10px">Instagram</label>
    <input id="instagram" style="width:100%;padding:10px" placeholder="https://instagram.com/..."/>

    <label style="display:block;margin-top:10px">Website</label>
    <input id="website" style="width:100%;padding:10px" placeholder="https://..."/>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
      <button id="save">Lưu profile</button>
      <a href="/account/scripts.html">Kịch bản</a>
      <a href="/account/history.html">Lịch sử</a>
    </div>

    <p id="msg" class="small" style="margin-top:10px"></p>
  </div>
</main>

<script type="module">
  import { supabase, esc, requireLogin, logout } from "./account.js";
  const me = await requireLogin();

  const setMsg = t => document.getElementById("msg").innerHTML = esc(t);
  document.getElementById("email").textContent = me.email || "";

  const md = me.user_metadata || {};
  full_name.value = md.full_name || "";
  phone.value = md.phone || "";
  facebook.value = md.facebook || "";
  instagram.value = md.instagram || "";
  website.value = md.website || "";

  document.getElementById("save").onclick = async () => {
    setMsg("Đang lưu...");
    const { error } = await supabase.auth.updateUser({
      data: {
        full_name: full_name.value.trim(),
        phone: phone.value.trim(),
        facebook: facebook.value.trim(),
        instagram: instagram.value.trim(),
        website: website.value.trim(),
      }
    });
    if(error){ setMsg("Error: " + error.message); return; }
    setMsg("Đã lưu.");
  };

  document.getElementById("logout").onclick = logout;
</script>
</body>
</html>
